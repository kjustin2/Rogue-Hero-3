<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpolygon points='16,2 26,16 16,30 6,16' fill='%235fe0ff'/%3E%3Cpolygon points='16,8 21,16 16,24 11,16' fill='%23070710'/%3E%3C/svg%3E" />
  <title>Rogue Hero III — Ember Rift</title>
  <style>
    /* Boot loader — inlined so it paints before the JS bundle downloads/evaluates,
       covering the whole module-eval + shader-warm window. Ember Rift theme; pure
       CSS animation so it keeps moving while the bundle loads. main.ts fades it out
       (.rl-done) once the menu render path is warmed and webfonts are ready. */
    #rift-loader {
      position: fixed; inset: 0; z-index: 1000;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: radial-gradient(125% 95% at 50% 36%, #111a3a 0%, #0a0c1c 46%, #050509 100%);
      color: #e8ecf4; overflow: hidden;
      font-family: "Rajdhani", "Segoe UI", system-ui, sans-serif;
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }
    #rift-loader.rl-done { opacity: 0; visibility: hidden; pointer-events: none; }
    @media (prefers-reduced-motion: reduce) {
      #rift-loader *, #rift-loader { animation: none !important; }
    }

    /* faint vignette + a slow aurora wash to match the menu backdrop */
    #rift-loader::before {
      content: ""; position: absolute; inset: -20%;
      background: radial-gradient(60% 40% at 30% 20%, rgba(95,224,255,0.10), transparent 70%),
                  radial-gradient(50% 40% at 75% 80%, rgba(255,138,61,0.08), transparent 70%);
      animation: rl-wash 9s ease-in-out infinite alternate;
    }
    @keyframes rl-wash { from { transform: translate3d(-2%, -1%, 0) scale(1); } to { transform: translate3d(2%, 1%, 0) scale(1.05); } }

    /* drifting ember motes */
    .rl-embers { position: absolute; inset: 0; pointer-events: none; }
    .rl-ember {
      position: absolute; bottom: -12px; width: 4px; height: 4px; border-radius: 50%;
      background: #ff8a3d; box-shadow: 0 0 9px 2px rgba(255,122,48,0.7);
      opacity: 0; animation: rl-rise linear infinite;
    }
    @keyframes rl-rise {
      0%   { transform: translateY(0) scale(1);   opacity: 0; }
      12%  { opacity: 0.9; }
      100% { transform: translateY(-104vh) scale(0.25); opacity: 0; }
    }

    .rl-core { position: relative; display: flex; flex-direction: column; align-items: center; }

    /* the rift diamond — a spinning cyan frame around a pulsing gold core */
    .rl-diamond { position: relative; width: 96px; height: 96px; margin-bottom: 36px; animation: rl-spin 7s linear infinite; }
    .rl-diamond::before, .rl-diamond::after {
      content: ""; position: absolute; inset: 0; transform: rotate(45deg);
      border: 2px solid #5fe0ff;
      box-shadow: 0 0 24px rgba(95,224,255,0.5), inset 0 0 16px rgba(95,224,255,0.32);
    }
    .rl-diamond::after {
      inset: 28px; border-color: #ffc266;
      box-shadow: 0 0 18px rgba(255,194,102,0.6), inset 0 0 10px rgba(255,194,102,0.4);
      animation: rl-pulse 1.7s ease-in-out infinite;
    }
    @keyframes rl-spin { to { transform: rotate(360deg); } }
    @keyframes rl-pulse { 0%,100% { opacity: 0.5; transform: rotate(45deg) scale(0.92); } 50% { opacity: 1; transform: rotate(45deg) scale(1.08); } }

    .rl-title {
      font-family: "Cinzel", "Times New Roman", serif;
      font-size: clamp(26px, 5vw, 46px); font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase;
      background: linear-gradient(180deg, #ffffff, #9fd8ff 58%, #5fe0ff);
      -webkit-background-clip: text; background-clip: text; color: transparent;
      filter: drop-shadow(0 0 26px rgba(95,224,255,0.25));
    }
    .rl-title b { -webkit-text-fill-color: #ffc266; color: #ffc266; }
    .rl-sub { margin-top: 9px; font-size: 13px; letter-spacing: 0.5em; padding-left: 0.5em; color: #8a93a8; text-transform: uppercase; }

    .rl-bar { margin-top: 30px; width: min(320px, 62vw); height: 3px; border-radius: 3px; background: rgba(120,150,200,0.16); overflow: hidden; }
    .rl-bar-fill {
      height: 100%; width: 8%; border-radius: 3px;
      background: linear-gradient(90deg, #5fe0ff, #ffc266);
      box-shadow: 0 0 14px rgba(95,224,255,0.7);
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .rl-status { margin-top: 15px; font-size: 11.5px; letter-spacing: 0.34em; text-transform: uppercase; color: #7d869c; min-height: 1em; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="floaters"></div>
  <div id="hud"></div>
  <div id="overlay"></div>

  <div id="rift-loader">
    <div class="rl-embers">
      <span class="rl-ember" style="left:8%;  animation-duration:6.5s; animation-delay:0s"></span>
      <span class="rl-ember" style="left:17%; animation-duration:8s;   animation-delay:1.4s"></span>
      <span class="rl-ember" style="left:24%; animation-duration:5.5s; animation-delay:0.6s"></span>
      <span class="rl-ember" style="left:33%; animation-duration:9s;   animation-delay:2.2s"></span>
      <span class="rl-ember" style="left:41%; animation-duration:6s;   animation-delay:3.1s"></span>
      <span class="rl-ember" style="left:49%; animation-duration:7.5s; animation-delay:0.3s"></span>
      <span class="rl-ember" style="left:57%; animation-duration:5.8s; animation-delay:1.9s"></span>
      <span class="rl-ember" style="left:64%; animation-duration:8.6s; animation-delay:2.6s"></span>
      <span class="rl-ember" style="left:72%; animation-duration:6.2s; animation-delay:0.9s"></span>
      <span class="rl-ember" style="left:80%; animation-duration:7.1s; animation-delay:3.4s"></span>
      <span class="rl-ember" style="left:88%; animation-duration:5.6s; animation-delay:1.1s"></span>
      <span class="rl-ember" style="left:94%; animation-duration:8.3s; animation-delay:2.0s"></span>
    </div>
    <div class="rl-core">
      <div class="rl-diamond"></div>
      <div class="rl-title">Rogue Hero <b>III</b></div>
      <div class="rl-sub">Ember Rift</div>
      <div class="rl-bar"><div class="rl-bar-fill"></div></div>
      <div class="rl-status">Opening the rift…</div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
